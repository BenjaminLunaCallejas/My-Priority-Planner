<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priority Planner Pro - Hub Ciencia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .task-card { transition: transform 0.2s ease, opacity 0.3s; }
        .task-card:hover { transform: translateY(-2px); }
        body { background-color: #0f172a; color: #f8fafc; overflow: hidden; }
        
        /* Scrollbar Global */
        ::-webkit-scrollbar { height: 8px; width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; border-radius: 8px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 8px; border: 2px solid #1e293b;}
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* Scrollbar inferior específico para el visor semanal */
        .view-week #kanbanBoard {
            overflow-x: auto !important;
            padding-bottom: 15px; /* Espacio para la barra */
        }

        #authOverlay { background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(10px); z-index: 100; }
        .subtask-container { border-left: 2px solid #334155; margin-left: 0.5rem; padding-left: 0.5rem; margin-top: 0.5rem; }
        .notes-area { scrollbar-width: thin; font-size: 11px; }
        
        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(7, minmax(150px, 1fr)); 
            gap: 0.5rem; 
            width: 100%;
            padding-bottom: 2rem;
        }

        .highlight-task { border: 2px solid #38bdf8 !important; box-shadow: 0 0 15px rgba(56, 189, 248, 0.5); }
    </style>
</head>
<body class="p-4 md:p-6 h-screen flex flex-col view-week">

    <div id="authOverlay" class="fixed inset-0 flex flex-col justify-center items-center">
        <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-2xl text-center max-w-sm w-full mx-4">
            <h2 class="text-2xl font-bold text-sky-400 mb-2">Hub Ciencia Emprende</h2>
            <button id="btnLogin" class="w-full bg-white text-slate-900 font-bold py-3 px-4 rounded-lg flex items-center justify-center gap-3 hover:bg-slate-200 transition mt-6">
                <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" width="20">
                Entrar con Google
            </button>
            <p id="authStatus" class="mt-4 text-xs text-slate-500 italic">Verificando sesión...</p>
        </div>
    </div>

    <div class="max-w-[1600px] mx-auto w-full flex-grow flex flex-col overflow-hidden">
        <header class="mb-4 flex flex-col md:flex-row justify-between items-center border-b border-slate-700 pb-4 shrink-0">
            <div>
                <h1 class="text-2xl font-bold text-sky-400">Task Prioritizer Pro</h1>
                <p class="text-slate-400 text-xs mt-1">Gestión Científica de Proyectos</p>
            </div>
            <div class="flex items-center gap-4 mt-2 md:mt-0">
                <div class="flex bg-slate-800 rounded-lg p-1 border border-slate-700">
                    <button onclick="changeView('day')" id="btnViewDay" class="px-3 py-1 rounded-md text-xs transition">Día</button>
                    <button onclick="changeView('week')" id="btnViewWeek" class="px-3 py-1 rounded-md text-xs bg-sky-600 text-white transition">Semana</button>
                    <button onclick="changeView('month')" id="btnViewMonth" class="px-3 py-1 rounded-md text-xs transition">Mes</button>
                </div>
                <button onclick="openListView()" class="text-xs bg-sky-600 hover:bg-sky-500 px-4 py-2 rounded-lg text-white font-bold transition flex items-center gap-1 shadow-lg">🔍 Buscar / Lista</button>
                <button onclick="toggleModal('completedModal')" class="text-xs bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-slate-200">Historial</button>
                <div id="userProfile" class="hidden flex items-center gap-2">
                    <img id="userAvatar" src="" class="w-7 h-7 rounded-full border border-slate-600">
                    <button id="btnLogout" class="text-[10px] text-sky-400 hover:underline">Salir</button>
                </div>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-6 flex-grow overflow-hidden">
            <aside class="w-full lg:w-80 bg-slate-800 p-5 rounded-xl shadow-xl overflow-y-auto border border-slate-700 shrink-0">
                <h2 id="formTitle" class="text-md font-semibold mb-4 text-white border-l-4 border-sky-500 pl-2">Nueva Tarea Maestra</h2>
                <div id="mainForm" class="space-y-3">
                    <input type="hidden" id="editTaskId">
                    <input type="text" id="taskTitle" placeholder="Nombre de la tarea..." class="w-full p-2.5 rounded-lg bg-slate-900 border border-slate-700 text-sm text-white outline-none focus:border-sky-500">
                    <textarea id="taskNotes" placeholder="Notas o enlaces..." class="w-full p-2.5 h-16 rounded-lg bg-slate-900 border border-slate-700 text-xs text-slate-300 resize-none outline-none focus:border-sky-500"></textarea>

                    <div class="grid grid-cols-3 gap-1.5 text-[10px]">
                        <select id="imp" class="p-1.5 rounded bg-slate-900 border border-slate-700 text-white"><option value="3">Muy Importante</option><option value="2">Importancia Media</option><option value="1">Poco Importante</option></select>
                        <select id="urg" class="p-1.5 rounded bg-slate-900 border border-slate-700 text-white"><option value="3">Muy Urgente</option><option value="2">Pronta</option><option value="1">Poco Urgente</option></select>
                        <select id="comp" class="p-1.5 rounded bg-slate-900 border border-slate-700 text-white"><option value="1">Esfuerzo Bajo</option><option value="2">Esfuerzo Medio</option><option value="3">Esfuerzo Alto</option></select>
                    </div>

                    <div class="grid grid-cols-2 gap-2 p-2 bg-slate-900/50 rounded border border-slate-700">
                        <div class="flex flex-col">
                            <label class="text-[9px] text-sky-400 font-bold uppercase">Fecha de Inicio</label>
                            <input type="date" id="taskStartDate" class="bg-transparent text-white text-[10px] outline-none" style="color-scheme: dark;">
                        </div>
                        <div class="flex flex-col">
                            <label class="text-[9px] text-red-400 font-bold uppercase">Fecha de Entrega</label>
                            <input type="date" id="taskDueDate" class="bg-transparent text-white text-[10px] outline-none" style="color-scheme: dark;">
                        </div>
                    </div>

                    <div id="daysSelector" class="grid grid-cols-4 gap-1 text-[9px]">
                        <label class="flex items-center space-x-1"><input type="checkbox" value="Lunes" checked> <span>Lu</span></label>
                        <label class="flex items-center space-x-1"><input type="checkbox" value="Martes"> <span>Ma</span></label>
                        <label class="flex items-center space-x-1"><input type="checkbox" value="Miércoles"> <span>Mi</span></label>
                        <label class="flex items-center space-x-1"><input type="checkbox" value="Jueves"> <span>Ju</span></label>
                        <label class="flex items-center space-x-1"><input type="checkbox" value="Viernes"> <span>Vi</span></label>
                        <label class="flex items-center space-x-1"><input type="checkbox" value="Sábado"> <span>Sá</span></label>
                        <label class="flex items-center space-x-1"><input type="checkbox" value="Domingo"> <span>Do</span></label>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <input type="time" id="taskTime" class="p-1.5 rounded bg-slate-900 border border-slate-700 text-white text-[10px]" style="color-scheme: dark;">
                        <div class="flex gap-1">
                            <input type="number" id="taskDuration" placeholder="Duración" class="w-full p-1.5 rounded bg-slate-900 border border-slate-700 text-white text-[10px] outline-none">
                            <select id="taskDurationUnit" class="p-1.5 rounded bg-slate-900 border border-slate-700 text-white text-[10px] outline-none">
                                <option value="min">min</option>
                                <option value="h">h</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-2">
                        <label class="flex items-center space-x-1 text-[10px] cursor-pointer">
                            <input type="checkbox" id="isRecurring" class="accent-sky-500">
                            <span>Recurrente</span>
                        </label>
                    </div>

                    <button id="btnSubmitTask" onclick="handleAddTask()" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-2.5 rounded-lg transition text-sm">Crear Tarea</button>
                    <button id="btnCancelEdit" onclick="clearForm('mainForm')" class="w-full bg-slate-700 text-white py-1 rounded hidden text-xs">Cancelar Edición</button>
                </div>
            </aside>

            <div class="flex-grow flex flex-col min-w-0">
                <div class="flex justify-between items-center mb-3 bg-slate-800 p-2 rounded-lg border border-slate-700 shrink-0">
                    <button onclick="navigateTime(-1)" class="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-xs">←</button>
                    <h3 id="weekLabel" class="text-white font-bold text-xs tracking-wider"></h3>
                    <button onclick="navigateTime(1)" class="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-xs">→</button>
                </div>
                <main class="flex-grow overflow-y-auto bg-slate-900/30 rounded-xl border border-slate-800 p-2" id="kanbanBoard"></main>
            </div>
        </div>
    </div>

    <div id="subtaskModal" class="fixed inset-0 bg-black/80 hidden flex justify-center items-center z-[70] p-4 backdrop-blur-sm">
        <div class="bg-slate-800 p-6 rounded-xl w-full max-w-md border border-sky-500/30">
            <h2 id="subtaskModalTitle" class="text-lg font-bold text-sky-400 mb-4">Nueva Subtarea</h2>
            <div id="subtaskForm" class="space-y-4">
                <input type="hidden" id="parentTaskId">
                <input type="hidden" id="editSubId">
                <input type="text" id="subTitle" placeholder="¿Qué hay que hacer?" class="w-full p-2.5 rounded bg-slate-900 border border-slate-700 text-white text-sm">
                <textarea id="subNotes" placeholder="Notas adicionales..." class="w-full p-2 h-16 rounded bg-slate-900 border border-slate-700 text-xs text-slate-300 resize-none"></textarea>
                
                <div class="grid grid-cols-3 gap-2">
                    <select id="subImp" class="p-2 rounded bg-slate-900 border border-slate-700 text-xs text-white"><option value="3">Muy Importante</option><option value="2">Importancia Media</option><option value="1">Poca Importancia</option></select>
                    <select id="subUrg" class="p-2 rounded bg-slate-900 border border-slate-700 text-xs text-white"><option value="3">Muy Urgente</option><option value="2">Pronta</option><option value="1">Poco Urgente</option></select>
                    <select id="subComp" class="p-2 rounded bg-slate-900 border border-slate-700 text-xs text-white"><option value="1">Esfuerzo Bajo</option><option value="2">Esfuerzo Medio</option><option value="3">Esfuerzo Alto</option></select>
                </div>
                
                <div class="flex gap-2">
                    <input type="number" id="subDuration" placeholder="Duración" class="w-full p-2 rounded bg-slate-900 border border-slate-700 text-white text-xs">
                    <select id="subDurationUnit" class="p-2 rounded bg-slate-900 border border-slate-700 text-white text-xs shrink-0 outline-none">
                        <option value="min">min</option>
                        <option value="h">h</option>
                    </select>
                </div>

                <div class="flex gap-2">
                    <button onclick="toggleModal('subtaskModal')" class="flex-1 bg-slate-700 py-2 rounded text-white text-sm">Cancelar</button>
                    <button id="btnSaveSubtask" onclick="handleAddSubtask()" class="flex-1 bg-sky-600 py-2 rounded text-white font-bold text-sm">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="listModal" class="fixed inset-0 bg-black/80 hidden flex justify-center items-start z-[60] p-4 pt-10 backdrop-blur-sm">
        <div class="bg-slate-800 p-6 rounded-xl w-full max-w-4xl h-[85vh] flex flex-col border border-sky-500/30 shadow-2xl">
            <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-3 shrink-0">
                <h2 class="text-xl font-bold text-sky-400">Directorio General de Tareas</h2>
                <button onclick="toggleModal('listModal')" class="text-slate-400 hover:text-white text-2xl leading-none">&times;</button>
            </div>
            
            <input type="text" id="searchInput" oninput="renderListView()" placeholder="Escriba palabras clave para filtrar por título o notas..." class="w-full p-3 rounded-lg bg-slate-900 border border-slate-600 text-white text-sm mb-4 outline-none focus:border-sky-500 shrink-0">
            
            <div id="listViewContainer" class="overflow-y-auto space-y-2 flex-grow pr-2 scrollbar-thin"></div>
            
            <div class="mt-4 pt-3 border-t border-slate-700 text-right text-xs text-slate-500 shrink-0" id="listStats"></div>
        </div>
    </div>

    <div id="completedModal" class="fixed inset-0 bg-black/70 hidden flex justify-center items-center z-50 p-4">
        <div class="bg-slate-800 p-6 rounded-xl w-full max-w-xl max-h-[70vh] flex flex-col">
            <h2 class="text-lg font-bold text-emerald-400 mb-4 border-b border-slate-700 pb-2">Tareas Completadas</h2>
            <div id="completedList" class="overflow-y-auto space-y-2 flex-grow"></div>
            <button onclick="toggleModal('completedModal')" class="mt-4 bg-slate-700 p-2 rounded text-xs">Cerrar</button>
        </div>
    </div>

    <script>
        window.tasks = JSON.parse(localStorage.getItem('priorityTasksPro')) || [];
        let expandedTasks = new Set();
        let listExpandedTasks = new Set(); // Nuevo estado para el modal de lista
        let currentView = 'week'; 
        let baseDate = new Date(); 

        const toLocalISO = (date) => {
            const z = n => ('0' + n).slice(-2);
            return `${date.getFullYear()}-${z(date.getMonth()+1)}-${z(date.getDate())}`;
        };

        const weekDays = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];

        function getMonday(d) {
            d = new Date(d); d.setHours(0,0,0,0);
            let day = d.getDay();
            let diff = d.getDate() - day + (day == 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        function changeView(view) {
            currentView = view;
            document.body.className = `p-4 md:p-6 h-screen flex flex-col view-${view}`;
            ['btnViewDay', 'btnViewWeek', 'btnViewMonth'].forEach(id => {
                document.getElementById(id).classList.remove('bg-sky-600', 'text-white');
            });
            document.getElementById(`btnView${view.charAt(0).toUpperCase() + view.slice(1)}`).classList.add('bg-sky-600', 'text-white');
            renderKanban();
        }

        function navigateTime(direction) {
            if (currentView === 'day') baseDate.setDate(baseDate.getDate() + direction);
            else if (currentView === 'week') baseDate.setDate(baseDate.getDate() + (direction * 7));
            else if (currentView === 'month') baseDate.setMonth(baseDate.getMonth() + direction);
            renderKanban();
        }

        function openEditTask(id) {
            recursiveAction(window.tasks, id, (list, idx) => {
                const t = list[idx];
                document.getElementById('editTaskId').value = t.id;
                document.getElementById('taskTitle').value = t.title;
                document.getElementById('taskNotes').value = t.notes || "";
                document.getElementById('imp').value = t.i;
                document.getElementById('urg').value = t.u;
                document.getElementById('comp').value = t.c;
                document.getElementById('taskStartDate').value = t.startDate;
                document.getElementById('taskTime').value = t.time || "";
                document.getElementById('taskDuration').value = t.duration || "";
                document.getElementById('taskDurationUnit').value = t.durationUnit || "min";
                document.getElementById('isRecurring').checked = t.isRecurring;
                
                document.querySelectorAll('#daysSelector input').forEach(cb => {
                    cb.checked = t.days.includes(cb.value);
                });

                document.getElementById('formTitle').innerText = "Editando Tarea";
                document.getElementById('btnSubmitTask').innerText = "Actualizar Tarea";
                document.getElementById('btnCancelEdit').classList.remove('hidden');
            });
        }

        function handleAddTask() {
            const editId = document.getElementById('editTaskId').value;
            const taskData = gatherFormData('mainForm');
            if (!taskData) return;

            if (editId) {
                recursiveAction(window.tasks, parseInt(editId), (list, idx) => {
                    const oldSubtasks = list[idx].subtasks;
                    list[idx] = {...taskData, id: parseInt(editId), subtasks: oldSubtasks};
                });
            } else {
                window.tasks.push(taskData);
            }
            saveAndRender();
            clearForm('mainForm');
        }

        function handleAddSubtask() {
            const parentId = parseInt(document.getElementById('parentTaskId').value);
            const editSubId = document.getElementById('editSubId').value;
            const subtaskData = gatherFormData('subtaskForm');
            if (!subtaskData) return;

            if (editSubId) {
                recursiveAction(window.tasks, parseInt(editSubId), (list, idx) => {
                    list[idx] = {...subtaskData, id: parseInt(editSubId)};
                });
            } else {
                recursiveAction(window.tasks, parentId, (list, idx) => {
                    list[idx].subtasks = list[idx].subtasks || [];
                    list[idx].subtasks.push(subtaskData);
                    expandedTasks.add(parentId);
                });
            }
            saveAndRender();
            toggleModal('subtaskModal');
        }

        function openEditSubtask(id, parentId) {
            recursiveAction(window.tasks, id, (list, idx) => {
                const s = list[idx];
                document.getElementById('parentTaskId').value = parentId;
                document.getElementById('editSubId').value = s.id;
                document.getElementById('subTitle').value = s.title;
                document.getElementById('subNotes').value = s.notes || "";
                document.getElementById('subImp').value = s.i;
                document.getElementById('subUrg').value = s.u;
                document.getElementById('subComp').value = s.c;
                document.getElementById('subDuration').value = s.duration || "";
                document.getElementById('subDurationUnit').value = s.durationUnit || "min";
                
                document.getElementById('subtaskModalTitle').innerText = "Editando Subtarea";
                document.getElementById('btnSaveSubtask').innerText = "Actualizar";
                toggleModal('subtaskModal');
            });
        }

        function gatherFormData(prefix) {
            const isSub = prefix === 'subtaskForm';
            const title = document.getElementById(isSub ? 'subTitle' : 'taskTitle').value.trim();
            if (!title) { alert("El título es obligatorio"); return null; }
            
            return {
                id: Date.now(),
                title: title,
                notes: document.getElementById(isSub ? 'subNotes' : 'taskNotes').value.trim(),
                i: parseInt(document.getElementById(isSub ? 'subImp' : 'imp').value),
                u: parseInt(document.getElementById(isSub ? 'subUrg' : 'urg').value),
                c: parseInt(document.getElementById(isSub ? 'subComp' : 'comp').value),
                time: isSub ? "" : document.getElementById('taskTime').value,
                duration: document.getElementById(isSub ? 'subDuration' : 'taskDuration').value,
                durationUnit: document.getElementById(isSub ? 'subDurationUnit' : 'taskDurationUnit').value,
                startDate: isSub ? toLocalISO(new Date()) : document.getElementById('taskStartDate').value,
                days: isSub ? weekDays : Array.from(document.querySelectorAll('#daysSelector input:checked')).map(cb => cb.value),
                isRecurring: isSub ? false : document.getElementById('isRecurring').checked,
                completed: false,
                subtasks: [],
                score: (parseInt(document.getElementById(isSub ? 'subImp' : 'imp').value) * 3) + 
                       (parseInt(document.getElementById(isSub ? 'subUrg' : 'urg').value) * 2) - 
                        parseInt(document.getElementById(isSub ? 'subComp' : 'comp').value)
            };
        }

        function createDeepTaskHTML(t, parentId = null) {
            const isMonth = currentView === 'month';
            const hasSubtasks = t.subtasks && t.subtasks.length > 0;
            const isExpanded = !isMonth && expandedTasks.has(t.id);
            const colorClass = t.score >= 10 ? 'border-l-red-500' : (t.score >= 7 ? 'border-l-yellow-500' : 'border-l-emerald-500');
            
            return `
                <div id="task-${t.id}" class="task-card bg-slate-900 p-2 rounded border-l-4 ${colorClass} shadow-lg mb-2">
                    <div class="flex justify-between items-start gap-1">
                        <div class="cursor-pointer overflow-hidden flex-grow" onclick="toggleTaskExpansion(${t.id})">
                            <p class="text-[11px] font-bold text-slate-100 truncate">${hasSubtasks && !isMonth ? (isExpanded ? '▼ ' : '▶ ') : ''}${t.title}</p>
                            <div class="flex gap-2 items-center">
                                ${t.time && !isMonth ? `<span class="text-[9px] text-sky-400">🕒 ${t.time}</span>` : ''}
                                ${t.duration ? `<span class="text-[9px] text-slate-500">⏳ ${t.duration}${t.durationUnit === 'h' ? 'h' : 'm'}</span>` : ''}
                            </div>
                        </div>
                        <div class="flex gap-1 shrink-0">
                            <button onclick="${parentId ? `openEditSubtask(${t.id}, ${parentId})` : `openEditTask(${t.id})`}" title="Editar" class="text-[10px] text-slate-500 hover:text-sky-400">✎</button>
                            ${!parentId ? `<button onclick="openSubtaskModal(${t.id}, '${t.title}')" class="text-[10px] text-sky-500 hover:text-sky-300">+</button>` : ''}
                            <button onclick="completeTask(${t.id})" class="text-[10px] text-emerald-500 hover:text-emerald-300">✓</button>
                            <button onclick="deleteTask(${t.id})" class="text-[10px] text-red-500 hover:text-red-300">×</button>
                        </div>
                    </div>
                    ${isExpanded ? `
                        <textarea oninput="updateNote(${t.id}, this.value)" class="notes-area w-full bg-slate-950/50 p-1.5 mt-2 rounded border border-slate-800 text-slate-400 outline-none h-12 resize-none">${t.notes || ""}</textarea>
                        ${hasSubtasks ? `
                            <div class="subtask-container">
                                ${t.subtasks.filter(s => !s.completed).map(s => createDeepTaskHTML(s, t.id)).join('')}
                            </div>
                        ` : ''}
                    ` : ''}
                </div>`;
        }

        function renderKanban() {
            const board = document.getElementById('kanbanBoard');
            board.innerHTML = '';
            board.className = (currentView === 'month') ? "calendar-grid" : "flex gap-4 h-full items-start";
            
            const todayISO = toLocalISO(new Date());
            let startDate, iterations;

            if (currentView === 'day') {
                startDate = new Date(baseDate); iterations = 1;
            } else if (currentView === 'week') {
                startDate = getMonday(baseDate); iterations = 7;
            } else {
                const year = baseDate.getFullYear();
                const month = baseDate.getMonth();
                const firstDay = new Date(year, month, 1);
                let offset = firstDay.getDay() - 1;
                if (offset === -1) offset = 6;
                startDate = new Date(firstDay);
                startDate.setDate(startDate.getDate() - offset);
                iterations = 35; 
            }

            for (let i = 0; i < iterations; i++) {
                let colDate = new Date(startDate);
                colDate.setDate(colDate.getDate() + i);
                let colISO = toLocalISO(colDate);
                let dayName = weekDays[colDate.getDay() === 0 ? 6 : colDate.getDay() - 1];
                let isCurrentMonth = colDate.getMonth() === baseDate.getMonth();

                // MODIFICACIÓN APLICADA: Criterio jerárquico condicional (Tiempo > Puntuación heurística)
                const dayTasks = window.tasks.filter(t => {
                    if (t.completed) return false;
                    return t.isRecurring ? (t.days.includes(dayName) && colISO >= t.startDate) : (t.startDate === colISO);
                }).sort((a, b) => {
                    if (a.time && b.time) return a.time.localeCompare(b.time);
                    if (a.time && !b.time) return -1;
                    if (!a.time && b.time) return 1;
                    return b.score - a.score;
                });

                let colHtml = `
                    <div class="${currentView === 'month' ? 'min-h-[140px]' : 'min-w-[280px] w-[280px] h-full'} bg-slate-800/60 rounded-xl border ${colISO === todayISO ? 'border-sky-500 bg-slate-800' : 'border-slate-700'} flex flex-col ${!isCurrentMonth && currentView === 'month' ? 'opacity-20' : ''}">
                        <div class="p-2 border-b border-slate-700 flex justify-between items-center shrink-0">
                            <span class="text-[10px] font-bold ${colISO === todayISO ? 'text-sky-400' : 'text-slate-400'}">${dayName.substring(0,2)} ${colDate.getDate()}</span>
                            ${dayTasks.length > 0 ? `<span class="bg-slate-900 text-[9px] px-1.5 rounded-full text-slate-500">${dayTasks.length}</span>` : ''}
                        </div>
                        <div class="p-2 overflow-y-auto flex-grow scroll-container">
                            ${dayTasks.map(t => createDeepTaskHTML(t)).join('')}
                        </div>
                    </div>`;
                board.innerHTML += colHtml;
            }

            let label = "";
            if (currentView === 'day') {
                label = baseDate.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
            } else if (currentView === 'week') {
                const monday = getMonday(baseDate);
                const sunday = new Date(monday);
                sunday.setDate(monday.getDate() + 6);
                const monthOpt = { month: 'long' };
                if (monday.getMonth() === sunday.getMonth()) {
                    label = `Semana del ${monday.getDate()} al ${sunday.getDate()} de ${sunday.toLocaleDateString('es-ES', monthOpt)}`;
                } else {
                    label = `Del ${monday.getDate()} de ${monday.toLocaleDateString('es-ES', monthOpt)} al ${sunday.getDate()} de ${sunday.toLocaleDateString('es-ES', monthOpt)}`;
                }
            } else {
                label = baseDate.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
            }
            document.getElementById('weekLabel').innerText = label.toUpperCase();
        }

        // --- Nuevas Funciones para el Buscador y Visor de Lista ---
        function openListView() {
            document.getElementById('searchInput').value = '';
            renderListView();
            toggleModal('listModal');
            setTimeout(() => document.getElementById('searchInput').focus(), 100);
        }

        function toggleListTaskExpansion(id) {
            if (listExpandedTasks.has(id)) listExpandedTasks.delete(id);
            else listExpandedTasks.add(id);
            renderListView();
        }

        function renderListView() {
            const container = document.getElementById('listViewContainer');
            const stats = document.getElementById('listStats');
            const query = document.getElementById('searchInput').value.toLowerCase();
            container.innerHTML = '';

            const flatTasks = [];
            const getFlatActive = (taskList, parentId = null, parentTitle = null) => {
                taskList.forEach(t => {
                    if (!t.completed) {
                        flatTasks.push({ ...t, parentId, parentTitle });
                        if (t.subtasks && t.subtasks.length > 0) {
                            getFlatActive(t.subtasks, t.id, t.title);
                        }
                    }
                });
            };
            getFlatActive(window.tasks);

            const filtered = flatTasks.filter(t => 
                t.title.toLowerCase().includes(query) || 
                (t.notes && t.notes.toLowerCase().includes(query))
            );

            // MODIFICACIÓN APLICADA: Criterio jerárquico condicional para la vista de lista global
            filtered.sort((a, b) => {
                if (a.startDate !== b.startDate) return a.startDate.localeCompare(b.startDate);
                if (a.time && b.time) return a.time.localeCompare(b.time);
                if (a.time && !b.time) return -1;
                if (!a.time && b.time) return 1;
                return b.score - a.score;
            });

            if (filtered.length === 0) {
                container.innerHTML = '<p class="text-slate-500 text-center py-10 text-sm">No se encontraron tareas pendientes con esa búsqueda.</p>';
                stats.innerText = '0 tareas coincidentes';
                return;
            }

            filtered.forEach(t => {
                const isSub = !!t.parentTitle;
                const colorClass = t.score >= 10 ? 'border-l-red-500 text-red-400' : (t.score >= 7 ? 'border-l-yellow-500 text-yellow-400' : 'border-l-emerald-500 text-emerald-400');
                
                const hasActiveSubtasks = !isSub && t.subtasks && t.subtasks.filter(st => !st.completed).length > 0;
                const isExpanded = listExpandedTasks.has(t.id);
                
                let subtasksHtml = '';
                if (hasActiveSubtasks && isExpanded) {
                    subtasksHtml = `<div class="mt-2 pl-4 border-l-2 border-slate-600 space-y-2 w-full">`;
                    t.subtasks.filter(s => !s.completed).forEach(s => {
                        subtasksHtml += `
                        <div class="bg-slate-800 p-3 rounded-lg border border-slate-700 flex justify-between items-center gap-2">
                            <div>
                                <h5 class="font-bold text-slate-200 text-xs">${s.title}</h5>
                                ${s.duration ? `<span class="text-[10px] text-slate-500">⏳ ${s.duration}${s.durationUnit}</span>` : ''}
                            </div>
                            <div class="flex gap-2 shrink-0">
                                <button onclick="toggleModal('listModal'); openEditSubtask(${s.id}, ${t.id})" class="bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-md text-[10px] text-white transition shadow-sm">✎ Editar</button>
                                <button onclick="completeTask(${s.id}); renderListView();" class="bg-emerald-600 hover:bg-emerald-500 px-3 py-1.5 rounded-md text-[10px] text-white transition shadow-sm">✓ Completar</button>
                            </div>
                        </div>`;
                    });
                    subtasksHtml += `</div>`;
                }

                container.innerHTML += `
                <div class="bg-slate-900/80 p-4 rounded-lg border border-slate-700 border-l-4 ${colorClass} flex flex-col gap-3 hover:border-sky-500 transition-colors">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-3 w-full">
                        <div class="flex-grow w-full">
                            <div class="flex items-center gap-2 mb-1">
                                ${isSub ? `<span class="bg-slate-700 text-[10px] px-2 py-0.5 rounded text-slate-300 font-medium tracking-wide">Subtarea de: ${t.parentTitle}</span>` : ''}
                                ${t.isRecurring ? `<span class="bg-indigo-900 text-[10px] px-2 py-0.5 rounded text-indigo-300 font-medium tracking-wide">Recurrente</span>` : ''}
                            </div>
                            <h4 class="font-bold text-slate-100 text-sm ${hasActiveSubtasks ? 'cursor-pointer hover:text-sky-400 select-none' : ''}" 
                                ${hasActiveSubtasks ? `onclick="toggleListTaskExpansion(${t.id})"` : ''}>
                                ${hasActiveSubtasks ? (isExpanded ? '▼ ' : '▶ ') : ''}${t.title}
                            </h4>
                            ${t.notes ? `<p class="text-slate-400 text-xs mt-1 line-clamp-2">${t.notes}</p>` : ''}
                            <div class="text-[11px] text-slate-500 mt-2 flex flex-wrap gap-4 font-medium">
                                <span class="flex items-center gap-1">📅 ${t.startDate}</span>
                                ${t.time ? `<span class="flex items-center gap-1">🕒 ${t.time}</span>` : ''}
                                ${t.duration ? `<span class="flex items-center gap-1">⏳ ${t.duration}${t.durationUnit}</span>` : ''}
                            </div>
                        </div>
                        <div class="flex gap-2 shrink-0 mt-3 md:mt-0">
                            <button onclick="toggleModal('listModal'); ${isSub ? `openEditSubtask(${t.id}, ${t.parentId})` : `openEditTask(${t.id})`}" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-md text-xs text-white transition shadow-sm">✎ Editar</button>
                            <button onclick="completeTask(${t.id}); renderListView();" class="bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-md text-xs text-white transition shadow-sm">✓ Completar</button>
                        </div>
                    </div>
                    ${subtasksHtml}
                </div>`;
            });

            stats.innerText = `Mostrando ${filtered.length} tarea(s) en total`;
        }
        // -----------------------------------------------------------

        function toggleTaskExpansion(id) {
            if (currentView === 'month') return;
            if (expandedTasks.has(id)) expandedTasks.delete(id);
            else expandedTasks.add(id);
            renderKanban();
        }

        function openSubtaskModal(parentId, parentTitle) {
            clearForm('subtaskForm');
            document.getElementById('parentTaskId').value = parentId;
            document.getElementById('editSubId').value = "";
            document.getElementById('subtaskModalTitle').innerText = `Subtarea para: ${parentTitle}`;
            document.getElementById('btnSaveSubtask').innerText = "Guardar";
            toggleModal('subtaskModal');
        }

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        
        function saveAndRender() {
            localStorage.setItem('priorityTasksPro', JSON.stringify(window.tasks));
            renderKanban();
            renderCompleted();
            if(!document.getElementById('listModal').classList.contains('hidden')) {
                renderListView();
            }
            window.dispatchEvent(new CustomEvent('tasksUpdated', { detail: window.tasks }));
        }

        function recursiveAction(list, id, action) {
            for (let i = 0; i < list.length; i++) {
                if (list[i].id === id) { action(list, i); return true; }
                if (list[i].subtasks && recursiveAction(list[i].subtasks, id, action)) return true;
            }
            return false;
        }

        function completeTask(id) {
            recursiveAction(window.tasks, id, (list, idx) => {
                list[idx].completed = true;
                if (list[idx].subtasks) list[idx].subtasks.forEach(s => s.completed = true);
            });
            saveAndRender();
        }

        function undoTask(id) {
            recursiveAction(window.tasks, id, (list, idx) => {
                list[idx].completed = false;
            });
            saveAndRender();
        }

        function deleteTask(id) {
            recursiveAction(window.tasks, id, (list, idx) => list.splice(idx, 1));
            saveAndRender();
        }

        function updateNote(id, val) {
            recursiveAction(window.tasks, id, (list, idx) => { list[idx].notes = val; });
            localStorage.setItem('priorityTasksPro', JSON.stringify(window.tasks));
            window.dispatchEvent(new CustomEvent('tasksUpdated', { detail: window.tasks }));
        }

        function renderCompleted() {
            const list = document.getElementById('completedList');
            list.innerHTML = '';
            const getFlat = (tasks, acc = []) => {
                tasks.forEach(t => { if (t.completed) acc.push(t); if (t.subtasks) getFlat(t.subtasks, acc); });
                return acc;
            };
            getFlat(window.tasks).forEach(t => {
                list.innerHTML += `
                <div class="bg-slate-900/50 p-2 rounded border border-slate-700 flex justify-between items-center">
                    <span class="text-xs line-through text-slate-500">${t.title}</span>
                    <div class="flex gap-2">
                        <button onclick="undoTask(${t.id})" title="Deshacer" class="text-sky-400 text-[12px]">↺</button>
                        <button onclick="deleteTask(${t.id})" class="text-red-400 text-[10px]">Eliminar</button>
                    </div>
                </div>`;
            });
        }

        function clearForm(id) { 
            document.querySelectorAll(`#${id} input[type="text"], #${id} input[type="number"], #${id} input[type="hidden"], #${id} textarea`).forEach(i => i.value = ""); 
            
            if(document.getElementById('taskDurationUnit')) document.getElementById('taskDurationUnit').value = 'min';
            if(document.getElementById('subDurationUnit')) document.getElementById('subDurationUnit').value = 'min';

            if(id === 'mainForm') {
                document.getElementById('formTitle').innerText = "Nueva Tarea Maestra";
                document.getElementById('btnSubmitTask').innerText = "Crear Tarea";
                document.getElementById('btnCancelEdit').classList.add('hidden');
                document.getElementById('taskStartDate').value = toLocalISO(new Date());
            }
        }

        renderKanban();
        renderCompleted();
        document.getElementById('taskStartDate').value = toLocalISO(new Date());
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDOVhVaxAoVlP6VpdvPPR1Daa6qOphAMjk",
            authDomain: "mi-priority-planner.firebaseapp.com",
            projectId: "mi-priority-planner",
            storageBucket: "mi-priority-planner.firebasestorage.app",
            messagingSenderId: "101071265369",
            appId: "1:101071265369:web:be0b8666383a678bf99b48"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        let sessionUserId = null;

        document.getElementById('btnLogin').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('btnLogout').onclick = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                sessionUserId = user.uid;
                document.getElementById('authOverlay').classList.add('hidden');
                document.getElementById('userProfile').classList.remove('hidden');
                document.getElementById('userAvatar').src = user.photoURL;
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists() && docSnap.data().tasks) {
                    window.tasks = docSnap.data().tasks;
                    saveAndRender();
                }
            }
        });

        window.addEventListener('tasksUpdated', async (e) => {
            if (sessionUserId) {
                await setDoc(doc(db, "users", sessionUserId), { tasks: e.detail, lastSync: new Date().toISOString() });
            }
        });
    </script>
</body>
</html>
