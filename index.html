<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priority Planner Pro - Hub Ciencia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .task-card { transition: all 0.3s ease; }
        .task-card:hover { transform: translateY(-2px); }
        body { background-color: #0f172a; color: #f8fafc; }
        
        ::-webkit-scrollbar { height: 10px; width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; border-radius: 8px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 8px; }

        #authOverlay { background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(10px); z-index: 100; }
        .subtask-container { border-left: 2px solid #334155; margin-left: 0.75rem; padding-left: 0.5rem; }
        .notes-area { scrollbar-width: thin; font-size: 11px; }

        /* Efecto para tarea rastreada */
        .highlight-task { animation: pulse-border 2s infinite; border: 2px solid #38bdf8 !important; }
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0px rgba(56, 189, 248, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(56, 189, 248, 0); }
            100% { box-shadow: 0 0 0 0px rgba(56, 189, 248, 0); }
        }
    </style>
</head>
<body class="p-4 md:p-6 h-screen flex flex-col">

    <div id="authOverlay" class="fixed inset-0 flex flex-col justify-center items-center">
        <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-2xl text-center max-w-sm w-full mx-4">
            <h2 class="text-2xl font-bold text-sky-400 mb-2">Hub Ciencia Emprende</h2>
            <button id="btnLogin" class="w-full bg-white text-slate-900 font-bold py-3 px-4 rounded-lg flex items-center justify-center gap-3 hover:bg-slate-200 transition">
                <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" width="20">
                Entrar con Google
            </button>
        </div>
    </div>

    <div class="max-w-[1600px] mx-auto w-full flex-grow flex flex-col overflow-hidden">
        <header class="mb-4 flex flex-col md:flex-row justify-between items-center border-b border-slate-700 pb-4 shrink-0 gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-2xl font-bold text-sky-400">Task Prioritizer Pro</h1>
                <p class="text-slate-500 text-xs mt-1 italic">Vistas: Día | Semana | Mes</p>
            </div>

            <div class="flex bg-slate-800 p-1 rounded-xl border border-slate-700">
                <button onclick="setView('day')" id="btnViewDay" class="px-4 py-1.5 rounded-lg text-xs font-bold transition">Día</button>
                <button onclick="setView('week')" id="btnViewWeek" class="px-4 py-1.5 rounded-lg text-xs font-bold transition">Semana</button>
                <button onclick="setView('month')" id="btnViewMonth" class="px-4 py-1.5 rounded-lg text-xs font-bold transition">Mes</button>
            </div>

            <div class="flex items-center gap-4">
                <div id="userProfile" class="hidden flex items-center gap-2">
                    <img id="userAvatar" src="" class="w-8 h-8 rounded-full border border-slate-600">
                    <button id="btnLogout" class="text-xs text-sky-400 hover:underline">Salir</button>
                </div>
                <button onclick="toggleModal('completedModal')" class="text-xs bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg transition text-slate-200">Historial</button>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-6 flex-grow overflow-hidden">
            <aside class="w-full lg:w-[320px] bg-slate-800 p-5 rounded-xl shadow-xl overflow-y-auto shrink-0 h-fit border border-slate-700">
                <div id="mainForm" class="space-y-4">
                    <input type="text" id="taskTitle" placeholder="Tarea principal..." class="w-full p-2.5 rounded-lg bg-slate-900 border border-slate-700 focus:border-sky-500 outline-none text-sm text-white">
                    <textarea id="taskNotes" placeholder="Notas o enlaces..." class="w-full p-2.5 h-16 rounded-lg bg-slate-900 border border-slate-700 text-xs text-slate-300 resize-none"></textarea>

                    <div class="grid grid-cols-3 gap-1">
                        <select id="imp" class="p-1.5 rounded bg-slate-900 border border-slate-700 text-[10px] text-white"><option value="3">Alta</option><option value="2">Media</option><option value="1">Baja</option></select>
                        <select id="urg" class="p-1.5 rounded bg-slate-900 border border-slate-700 text-[10px] text-white"><option value="3">Urgente</option><option value="2">Pronto</option><option value="1">Normal</option></select>
                        <select id="comp" class="p-1.5 rounded bg-slate-900 border border-slate-700 text-[10px] text-white"><option value="1">Esf: B</option><option value="2">M</option><option value="3">A</option></select>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <input type="date" id="taskStartDate" class="p-2 rounded bg-slate-900 border border-slate-700 text-[10px] text-white" style="color-scheme: dark;">
                        <input type="date" id="taskDueDate" class="p-2 rounded bg-slate-900 border border-slate-700 text-[10px] text-white" style="color-scheme: dark;">
                    </div>

                    <button onclick="handleAddTask()" class="w-full bg-sky-600 hover:bg-sky-50 text-sky-900 font-bold py-2 rounded-lg transition shadow-lg">Crear Tarea</button>
                </div>
            </aside>

            <div class="flex-grow flex flex-col overflow-hidden">
                <div class="flex justify-between items-center mb-4 bg-slate-800 p-2 rounded-xl border border-slate-700 shrink-0">
                    <button onclick="moveTime(-1)" class="p-2 hover:bg-slate-700 rounded-lg text-sky-400 font-bold">←</button>
                    <h3 id="calendarLabel" class="text-white font-bold text-sm tracking-widest uppercase"></h3>
                    <button onclick="moveTime(1)" class="p-2 hover:bg-slate-700 rounded-lg text-sky-400 font-bold">→</button>
                </div>
                
                <main id="kanbanBoard" class="flex-grow flex overflow-auto gap-4 p-1 pb-4 items-start"></main>
            </div>
        </div>
    </div>

    <div id="subtaskModal" class="fixed inset-0 bg-black/80 hidden flex justify-center items-center z-[60] p-4 backdrop-blur-sm">
        <div class="bg-slate-800 p-6 rounded-xl w-full max-w-md border border-sky-500/30">
            <h2 id="subtaskModalTitle" class="text-xl font-bold text-sky-400 mb-4">Agregar Subtarea</h2>
            <div id="subtaskForm" class="space-y-4">
                <input type="hidden" id="parentTaskId">
                <input type="text" id="subTitle" placeholder="Acción específica..." class="w-full p-2 rounded bg-slate-900 border border-slate-700 text-white">
                <textarea id="subNotes" placeholder="Detalles..." class="w-full p-2 h-16 rounded bg-slate-900 border border-slate-700 text-xs text-slate-300 resize-none"></textarea>
                <div class="flex gap-2"><button onclick="toggleModal('subtaskModal')" class="flex-1 bg-slate-700 py-2 rounded text-white">Cerrar</button><button onclick="handleAddSubtask()" class="flex-1 bg-sky-600 py-2 rounded text-white font-bold">Añadir</button></div>
            </div>
        </div>
    </div>

    <div id="completedModal" class="fixed inset-0 bg-black/70 hidden flex justify-center items-center z-50 p-4">
        <div class="bg-slate-800 p-6 rounded-xl w-full max-w-2xl max-h-[80vh] flex flex-col border border-slate-600">
            <h2 class="text-xl font-bold text-emerald-400 mb-4">Completadas</h2>
            <div id="completedList" class="overflow-y-auto space-y-2 flex-grow"></div>
            <button onclick="toggleModal('completedModal')" class="mt-4 bg-slate-700 p-2 rounded text-white">Cerrar</button>
        </div>
    </div>

    <script>
        // --- ESTADO GLOBAL ---
        window.tasks = JSON.parse(localStorage.getItem('priorityTasksPro')) || [];
        let currentView = 'week'; // 'day', 'week', 'month'
        let pivotDate = new Date();
        pivotDate.setHours(0,0,0,0);
        let expandedTasks = new Set();
        let trackedTaskId = new URLSearchParams(window.location.search).get('task');

        const toLocalISO = (d) => `${d.getFullYear()}-${('0'+(d.getMonth()+1)).slice(-2)}-${('0'+d.getDate()).slice(-2)}`;
        
        // --- NAVEGACIÓN Y VISTAS ---

        function setView(view) {
            currentView = view;
            document.querySelectorAll('[id^="btnView"]').forEach(b => b.className = "px-4 py-1.5 rounded-lg text-xs font-bold transition text-slate-400 hover:bg-slate-700");
            document.getElementById('btnView' + view.charAt(0).toUpperCase() + view.slice(1)).className = "px-4 py-1.5 rounded-lg text-xs font-bold transition bg-sky-600 text-white shadow-lg";
            renderKanban();
        }

        function moveTime(direction) {
            if (currentView === 'day') pivotDate.setDate(pivotDate.getDate() + direction);
            else if (currentView === 'week') pivotDate.setDate(pivotDate.getDate() + (direction * 7));
            else if (currentView === 'month') pivotDate.setMonth(pivotDate.getMonth() + direction);
            renderKanban();
        }

        // --- RASTREO (SHARE) ---
        function shareTask(id, date) {
            const url = new URL(window.location.href);
            url.searchParams.set('task', id);
            navigator.clipboard.writeText(url.toString());
            alert("Enlace de rastreo copiado. Al usar este link, la tarea se resaltará automáticamente.");
        }

        // --- RENDERIZADO RECURSIVO ---

        function createDeepTaskHTML(t, level = 0) {
            const isExpanded = expandedTasks.has(t.id);
            const isTracked = trackedTaskId == t.id;
            const colorClass = t.score >= 10 ? 'border-l-red-500' : (t.score >= 7 ? 'border-l-yellow-500' : 'border-l-emerald-500');
            
            if (isTracked) expandedTasks.add(t.id);

            return `
                <div id="task-${t.id}" class="task-card bg-slate-900 p-2 rounded-lg border-l-4 ${colorClass} mb-2 ${isTracked ? 'highlight-task' : ''}">
                    <div class="flex justify-between items-start gap-1">
                        <div class="cursor-pointer flex-grow overflow-hidden" onclick="toggleTaskExpansion(${t.id})">
                            <p class="text-[11px] font-bold text-slate-100 truncate">${t.subtasks?.length > 0 ? (isExpanded ? '▼ ' : '▶ ') : ''}${t.title}</p>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="shareTask(${t.id})" title="Copiar enlace de rastreo" class="text-[10px] text-slate-500 hover:text-sky-400">🔗</button>
                            <button onclick="openSubtaskModal(${t.id}, '${t.title}')" class="text-[10px] text-sky-500">+</button>
                            <button onclick="completeTask(${t.id})" class="text-[10px] text-emerald-500">✓</button>
                        </div>
                    </div>
                    ${isExpanded ? `
                        <div class="mt-2">
                            <textarea oninput="updateNote(${t.id}, this.value)" class="notes-area w-full bg-black/30 p-1.5 rounded text-slate-400 outline-none h-12">${t.notes || ""}</textarea>
                            <div class="subtask-container">
                                ${t.subtasks?.filter(s => !s.completed).map(s => createDeepTaskHTML(s, level + 1)).join('') || ''}
                            </div>
                        </div>
                    ` : ''}
                </div>`;
        }

        function renderKanban() {
            const board = document.getElementById('kanbanBoard');
            const label = document.getElementById('calendarLabel');
            board.innerHTML = '';
            
            let startDate = new Date(pivotDate);
            let daysToRender = 1;

            if (currentView === 'week') {
                let day = startDate.getDay();
                startDate.setDate(startDate.getDate() - (day === 0 ? 6 : day - 1));
                daysToRender = 7;
                label.innerText = `Semana ${startDate.toLocaleDateString('es-ES', {day:'numeric', month:'short'})}`;
            } else if (currentView === 'month') {
                startDate.setDate(1);
                daysToRender = new Date(startDate.getFullYear(), startDate.getMonth() + 1, 0).getDate();
                label.innerText = startDate.toLocaleDateString('es-ES', {month:'long', year:'numeric'});
                board.className = "grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-2 w-full"; // Vista cuadrícula
            } else {
                label.innerText = startDate.toLocaleDateString('es-ES', {day:'numeric', month:'long'});
                board.className = "flex overflow-auto gap-4 p-1 pb-4 items-start justify-center w-full";
            }

            if (currentView !== 'month') board.className = "flex overflow-auto gap-4 p-1 pb-4 items-start";

            for (let i = 0; i < daysToRender; i++) {
                let colDate = new Date(startDate);
                colDate.setDate(startDate.getDate() + i);
                let colISO = toLocalISO(colDate);
                let isToday = colISO === toLocalISO(new Date());

                const dayTasks = window.tasks.filter(t => !t.completed && t.startDate === colISO).sort((a,b) => b.score - a.score);

                board.innerHTML += `
                    <div class="min-w-[200px] ${currentView === 'month' ? 'bg-slate-800/40' : 'bg-slate-800/80'} rounded-xl border ${isToday ? 'border-sky-500 shadow-[0_0_10px_rgba(56,189,248,0.2)]' : 'border-slate-700'} flex flex-col max-h-[70vh]">
                        <div class="p-2 border-b border-slate-700 flex justify-between items-center">
                            <span class="text-[10px] font-bold ${isToday ? 'text-sky-400' : 'text-slate-400'}">${colDate.getDate()} ${currentView === 'week' ? colDate.toLocaleDateString('es-ES',{weekday:'short'}) : ''}</span>
                            <span class="text-[9px] bg-slate-900 px-1.5 rounded text-slate-500">${dayTasks.length}</span>
                        </div>
                        <div class="p-2 overflow-y-auto">
                            ${dayTasks.map(t => createDeepTaskHTML(t)).join('')}
                        </div>
                    </div>`;
            }

            // Si hay una tarea rastreada, hacer scroll hacia ella
            if (trackedTaskId) {
                setTimeout(() => {
                    const el = document.getElementById('task-' + trackedTaskId);
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 500);
            }
        }

        // --- LÓGICA DE DATOS (Persistencia de funciones anteriores) ---

        function handleAddTask() {
            const title = document.getElementById('taskTitle').value.trim();
            if(!title) return;
            window.tasks.push({
                id: Date.now(), title, 
                notes: document.getElementById('taskNotes').value,
                score: (parseInt(document.getElementById('imp').value)*3) + (parseInt(document.getElementById('urg').value)*2),
                startDate: document.getElementById('taskStartDate').value || toLocalISO(new Date()),
                completed: false, subtasks: []
            });
            saveAndRender();
            document.getElementById('taskTitle').value = "";
        }

        function handleAddSubtask() {
            const id = parseInt(document.getElementById('parentTaskId').value);
            const sub = { id: Date.now(), title: document.getElementById('subTitle').value, notes: document.getElementById('subNotes').value, completed: false };
            recursiveAction(window.tasks, id, (l, idx) => {
                l[idx].subtasks = l[idx].subtasks || [];
                l[idx].subtasks.push(sub);
                expandedTasks.add(id);
            });
            saveAndRender();
            toggleModal('subtaskModal');
        }

        function updateNote(id, val) {
            recursiveAction(window.tasks, id, (l, idx) => l[idx].notes = val);
            localStorage.setItem('priorityTasksPro', JSON.stringify(window.tasks));
            window.dispatchEvent(new CustomEvent('tasksUpdated', { detail: window.tasks }));
        }

        function saveAndRender() {
            localStorage.setItem('priorityTasksPro', JSON.stringify(window.tasks));
            renderKanban();
            renderCompleted();
            window.dispatchEvent(new CustomEvent('tasksUpdated', { detail: window.tasks }));
        }

        function recursiveAction(list, id, action) {
            for (let i = 0; i < list.length; i++) {
                if (list[i].id === id) { action(list, i); return true; }
                if (list[i].subtasks && recursiveAction(list[i].subtasks, id, action)) return true;
            }
            return false;
        }

        function completeTask(id) {
            recursiveAction(window.tasks, id, (l, idx) => l[idx].completed = true);
            saveAndRender();
        }

        function toggleTaskExpansion(id) {
            if(expandedTasks.has(id)) expandedTasks.delete(id); else expandedTasks.add(id);
            renderKanban();
        }

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        
        function openSubtaskModal(id, title) {
            document.getElementById('parentTaskId').value = id;
            document.getElementById('subtaskModalTitle').innerText = "+" + title;
            toggleModal('subtaskModal');
        }

        function renderCompleted() {
            const list = document.getElementById('completedList');
            list.innerHTML = window.tasks.filter(t => t.completed).map(t => `
                <div class="bg-slate-900/50 p-2 rounded border border-slate-700 flex justify-between text-xs">
                    <span class="line-through text-slate-500">${t.title}</span>
                </div>`).join('');
        }

        // --- INICIO ---
        document.getElementById('taskStartDate').value = toLocalISO(new Date());
        setView('week');

    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDOVhVaxAoVlP6VpdvPPR1Daa6qOphAMjk",
            authDomain: "mi-priority-planner.firebaseapp.com",
            projectId: "mi-priority-planner",
            storageBucket: "mi-priority-planner.firebasestorage.app",
            messagingSenderId: "101071265369",
            appId: "1:101071265369:web:be0b8666383a678bf99b48"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        let sessionUserId = null;

        document.getElementById('btnLogin').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('btnLogout').onclick = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                sessionUserId = user.uid;
                document.getElementById('authOverlay').classList.add('hidden');
                document.getElementById('userProfile').classList.remove('hidden');
                document.getElementById('userAvatar').src = user.photoURL;
                
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists() && docSnap.data().tasks) {
                    window.tasks = docSnap.data().tasks;
                    renderKanban();
                    renderCompleted();
                }
            }
        });

        window.addEventListener('tasksUpdated', async (e) => {
            if (sessionUserId) {
                await setDoc(doc(db, "users", sessionUserId), { tasks: e.detail, lastSync: new Date().toISOString() });
            }
        });
    </script>
</body>
</html>
