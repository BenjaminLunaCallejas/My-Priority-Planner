<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priority Planner Pro - Hub Ciencia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .task-card { transition: transform 0.2s ease, opacity 0.3s; }
        .task-card:hover { transform: translateY(-2px); }
        body { background-color: #0f172a; color: #f8fafc; }
        
        ::-webkit-scrollbar { height: 12px; width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; border-radius: 8px; margin: 0px 4px;}
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 8px; border: 2px solid #1e293b;}
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        #authOverlay { background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(10px); z-index: 100; }
        .subtask-container { border-left: 2px solid #334155; margin-left: 0.75rem; padding-left: 0.5rem; }
        
        /* Estilo para el área de notas */
        .notes-area { scrollbar-width: thin; font-size: 11px; }
    </style>
</head>
<body class="p-4 md:p-8 h-screen flex flex-col">

    <div id="authOverlay" class="fixed inset-0 flex flex-col justify-center items-center">
        <div class="bg-slate-800 p-8 rounded-2xl border border-slate-700 shadow-2xl text-center max-w-sm w-full mx-4">
            <h2 class="text-2xl font-bold text-sky-400 mb-2">Hub Ciencia Emprende</h2>
            <p class="text-slate-400 mb-6 text-sm">Inicia sesión para acceder a tu planificador personal.</p>
            <button id="btnLogin" class="w-full bg-white text-slate-900 font-bold py-3 px-4 rounded-lg flex items-center justify-center gap-3 hover:bg-slate-200 transition">
                <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" width="20">
                Entrar con Google
            </button>
            <p id="authStatus" class="mt-4 text-xs text-slate-500 italic">Verificando sesión...</p>
        </div>
    </div>

    <div class="max-w-7xl mx-auto w-full flex-grow flex flex-col">
        <header class="mb-4 flex flex-col md:flex-row justify-between items-start md:items-end border-b border-slate-700 pb-4 shrink-0 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-sky-400">Task Prioritizer Pro</h1>
                <p class="text-slate-400 text-sm mt-1">Timeline Dinámico | Notas y Enlaces | Hub Ciencia</p>
            </div>
            <div class="flex items-center gap-4">
                <div id="userProfile" class="hidden md:flex items-center gap-2 text-right">
                    <div class="text-xs">
                        <p id="userName" class="font-bold text-slate-200"></p>
                        <button id="btnLogout" class="text-sky-400 hover:underline">Cerrar Sesión</button>
                    </div>
                    <img id="userAvatar" src="" class="w-8 h-8 rounded-full border border-slate-600">
                </div>
                <button onclick="toggleModal('completedModal')" class="text-sm bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg transition text-slate-200 shadow-md">
                    Ver Historial
                </button>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-6 flex-grow overflow-hidden">
            <aside class="w-full lg:w-1/3 bg-slate-800 p-6 rounded-xl shadow-xl overflow-y-auto shrink-0 h-fit border border-slate-700">
                <h2 class="text-lg font-semibold mb-4 text-white border-l-4 border-sky-500 pl-2">Nueva Tarea Maestra</h2>
                <div id="mainForm" class="space-y-4">
                    <input type="text" id="taskTitle" placeholder="Ej. Título de la tarea principal..." class="w-full p-3 rounded-lg bg-slate-900 border border-slate-700 focus:border-sky-500 outline-none text-sm text-white">
                    
                    <textarea id="taskNotes" placeholder="Notas, comentarios o enlaces..." class="w-full p-3 h-20 rounded-lg bg-slate-900 border border-slate-700 focus:border-sky-500 outline-none text-xs text-slate-300 resize-none"></textarea>

                    <div class="grid grid-cols-3 gap-2 text-xs">
                        <select id="imp" class="p-2 rounded bg-slate-900 border border-slate-700 text-white"><option value="3">Imp: Alta</option><option value="2">Media</option><option value="1">Baja</option></select>
                        <select id="urg" class="p-2 rounded bg-slate-900 border border-slate-700 text-white"><option value="3">Urg: Inmediata</option><option value="2">Pronta</option><option value="1">Normal</option></select>
                        <select id="comp" class="p-2 rounded bg-slate-900 border border-slate-700 text-white"><option value="1">Esf: Bajo</option><option value="2">Medio</option><option value="3">Alto</option></select>
                    </div>

                    <div class="grid grid-cols-2 gap-3 p-3 bg-slate-900/50 rounded border border-slate-700/50">
                        <div class="flex flex-col">
                            <label class="mb-1 text-[10px] text-sky-400 font-bold uppercase">Inicio</label>
                            <input type="date" id="taskStartDate" class="p-2 rounded bg-slate-900 border border-slate-700 text-white text-xs" style="color-scheme: dark;">
                        </div>
                        <div class="flex flex-col">
                            <label class="mb-1 text-[10px] text-red-400 font-bold uppercase">Límite</label>
                            <input type="date" id="taskDueDate" class="p-2 rounded bg-slate-900 border border-slate-700 text-white text-xs" style="color-scheme: dark;">
                        </div>
                    </div>

                    <div id="daysSelector" class="grid grid-cols-4 gap-2 text-[10px]">
                        <label class="flex items-center space-x-1"><input type="checkbox" value="Lunes" class="accent-sky-500" checked> <span>Lu</span></label>
                        <label class="flex items-center space-x-1"><input type="checkbox" value="Martes" class="accent-sky-500"> <span>Ma</span></label>
                        <label class="flex items-center space-x-1"><input type="checkbox" value="Miércoles" class="accent-sky-500"> <span>Mi</span></label>
                        <label class="flex items-center space-x-1"><input type="checkbox" value="Jueves" class="accent-sky-500"> <span>Ju</span></label>
                        <label class="flex items-center space-x-1"><input type="checkbox" value="Viernes" class="accent-sky-500"> <span>Vi</span></label>
                        <label class="flex items-center space-x-1"><input type="checkbox" value="Sábado" class="accent-sky-500"> <span>Sá</span></label>
                        <label class="flex items-center space-x-1"><input type="checkbox" value="Domingo" class="accent-sky-500"> <span>Do</span></label>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <input type="time" id="taskTime" class="p-2 rounded bg-slate-900 border border-slate-700 text-white text-xs" style="color-scheme: dark;">
                        <select id="taskDuration" class="p-2 rounded bg-slate-900 border border-slate-700 text-white text-xs">
                            <option value="0">Sin tiempo</option>
                            <option value="30">30 min</option>
                            <option value="60">1 hora</option>
                            <option value="120">2 horas</option>
                        </select>
                    </div>
                    
                    <label class="flex justify-center items-center space-x-2 text-xs bg-slate-900 p-2 rounded border border-slate-700 cursor-pointer">
                        <input type="checkbox" id="isRecurring" class="accent-sky-500">
                        <span>Recurrencia Semanal</span>
                    </label>

                    <button onclick="handleAddTask()" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 rounded-lg transition shadow-lg">
                        Crear Tarea Principal
                    </button>
                </div>
            </aside>

            <div class="w-full lg:w-2/3 flex flex-col h-full overflow-hidden">
                <div class="flex justify-between items-center mb-4 bg-slate-800 p-3 rounded-xl border border-slate-700 shrink-0">
                    <button onclick="changeWeek(-7)" class="px-3 py-1.5 bg-slate-700 hover:bg-slate-600 rounded-lg text-xs text-white">← Anterior</button>
                    <h3 id="weekLabel" class="text-white font-bold text-sm tracking-wide"></h3>
                    <button onclick="changeWeek(7)" class="px-3 py-1.5 bg-slate-700 hover:bg-slate-600 rounded-lg text-xs text-white">Siguiente →</button>
                </div>
                <main class="w-full bg-slate-900/50 rounded-xl flex overflow-x-auto gap-4 p-2 pb-6 h-full items-start border border-slate-800" id="kanbanBoard"></main>
            </div>
        </div>
    </div>

    <div id="subtaskModal" class="fixed inset-0 bg-black/80 hidden flex justify-center items-center z-[60] p-4 backdrop-blur-sm">
        <div class="bg-slate-800 p-6 rounded-xl w-full max-w-md border border-sky-500/30 shadow-2xl">
            <h2 id="subtaskModalTitle" class="text-xl font-bold text-sky-400 mb-4">Agregar Subtarea</h2>
            <div id="subtaskForm" class="space-y-4">
                <input type="hidden" id="parentTaskId">
                <input type="text" id="subTitle" placeholder="Nombre de la subtarea..." class="w-full p-3 rounded-lg bg-slate-900 border border-slate-700 text-white">
                <textarea id="subNotes" placeholder="Notas adicionales para esta subtarea..." class="w-full p-2 h-16 rounded-lg bg-slate-900 border border-slate-700 text-xs text-slate-300 resize-none"></textarea>
                <div class="grid grid-cols-3 gap-2">
                    <select id="subImp" class="p-2 rounded bg-slate-900 border border-slate-700 text-xs text-white"><option value="3">Alta</option><option value="2">Media</option><option value="1">Baja</option></select>
                    <select id="subUrg" class="p-2 rounded bg-slate-900 border border-slate-700 text-xs text-white"><option value="3">Inmediata</option><option value="2">Pronta</option><option value="1">Normal</option></select>
                    <select id="subComp" class="p-2 rounded bg-slate-900 border border-slate-700 text-xs text-white"><option value="1">Esf: Bajo</option><option value="2">Medio</option><option value="3">Alto</option></select>
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="toggleModal('subtaskModal')" class="flex-1 bg-slate-700 py-2 rounded-lg text-white">Cancelar</button>
                    <button onclick="handleAddSubtask()" class="flex-1 bg-sky-600 py-2 rounded-lg text-white font-bold">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="completedModal" class="fixed inset-0 bg-black/70 hidden flex justify-center items-center z-50 p-4">
        <div class="bg-slate-800 p-6 rounded-xl w-full max-w-2xl max-h-[80vh] flex flex-col border border-slate-600">
            <h2 class="text-xl font-bold text-emerald-400 mb-4 border-b border-slate-700 pb-2">Historial</h2>
            <div id="completedList" class="overflow-y-auto space-y-2 flex-grow"></div>
            <button onclick="toggleModal('completedModal')" class="mt-4 bg-slate-700 p-2 rounded text-white">Cerrar</button>
        </div>
    </div>

    <script>
        window.tasks = JSON.parse(localStorage.getItem('priorityTasksPro')) || [];
        let expandedTasks = new Set();

        const toLocalISO = (date) => {
            const z = n => ('0' + n).slice(-2);
            return `${date.getFullYear()}-${z(date.getMonth()+1)}-${z(date.getDate())}`;
        };

        const parseLocal = (str) => {
            if(!str) return new Date();
            const [y, m, d] = str.split('-');
            return new Date(y, m-1, d);
        };

        function getMonday(d) {
            d = new Date(d); d.setHours(0,0,0,0);
            let day = d.getDay();
            let diff = d.getDate() - day + (day == 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        let currentWeekStart = getMonday(new Date());
        const weekDays = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];

        // --- ACCIONES ---

        function handleAddTask() {
            const task = gatherFormData('mainForm');
            if (!task) return;
            window.tasks.push(task);
            saveAndRender();
            clearForm('mainForm');
        }

        function handleAddSubtask() {
            const parentId = parseInt(document.getElementById('parentTaskId').value);
            const subtask = gatherFormData('subtaskForm');
            if (!subtask) return;

            const addRecursive = (list) => {
                for (let t of list) {
                    if (t.id === parentId) {
                        t.subtasks = t.subtasks || [];
                        t.subtasks.push(subtask);
                        expandedTasks.add(parentId);
                        return true;
                    }
                    if (t.subtasks && addRecursive(t.subtasks)) return true;
                }
                return false;
            };

            addRecursive(window.tasks);
            saveAndRender();
            toggleModal('subtaskModal');
        }

        function gatherFormData(prefix) {
            const isSub = prefix === 'subtaskForm';
            const title = document.getElementById(isSub ? 'subTitle' : 'taskTitle').value.trim();
            const notes = document.getElementById(isSub ? 'subNotes' : 'taskNotes').value.trim();
            
            if (!title) { alert("Título requerido"); return null; }

            return {
                id: Date.now(),
                title: title,
                notes: notes, // Guardamos la nota
                i: parseInt(document.getElementById(isSub ? 'subImp' : 'imp').value),
                u: parseInt(document.getElementById(isSub ? 'subUrg' : 'urg').value),
                c: parseInt(document.getElementById(isSub ? 'subComp' : 'comp').value),
                time: isSub ? "" : document.getElementById('taskTime').value,
                duration: isSub ? 0 : parseInt(document.getElementById('taskDuration').value),
                startDate: isSub ? toLocalISO(new Date()) : document.getElementById('taskStartDate').value,
                dueDate: isSub ? "" : document.getElementById('taskDueDate').value,
                days: isSub ? ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"] : Array.from(document.querySelectorAll('#daysSelector input:checked')).map(cb => cb.value),
                isRecurring: isSub ? false : document.getElementById('isRecurring').checked,
                completed: false,
                subtasks: [],
                score: (parseInt(document.getElementById(isSub ? 'subImp' : 'imp').value) * 3) + 
                       (parseInt(document.getElementById(isSub ? 'subUrg' : 'urg').value) * 2) - 
                       parseInt(document.getElementById(isSub ? 'subComp' : 'comp').value)
            };
        }

        function updateNote(id, val) {
            recursiveAction(window.tasks, id, (list, idx) => {
                list[idx].notes = val;
            });
            // Guardamos silenciosamente para no interrumpir el tipeo, pero disparamos el evento de sync
            localStorage.setItem('priorityTasksPro', JSON.stringify(window.tasks));
            window.dispatchEvent(new CustomEvent('tasksUpdated', { detail: window.tasks }));
        }

        function saveAndRender() {
            localStorage.setItem('priorityTasksPro', JSON.stringify(window.tasks));
            renderKanban();
            renderCompleted();
            window.dispatchEvent(new CustomEvent('tasksUpdated', { detail: window.tasks }));
        }

        function toggleTaskExpansion(id) {
            if (expandedTasks.has(id)) expandedTasks.delete(id);
            else expandedTasks.add(id);
            renderKanban();
        }

        function openSubtaskModal(parentId, parentTitle) {
            document.getElementById('parentTaskId').value = parentId;
            document.getElementById('subtaskModalTitle').innerText = `Subtarea para: ${parentTitle}`;
            document.getElementById('subTitle').value = "";
            document.getElementById('subNotes').value = "";
            toggleModal('subtaskModal');
        }

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('hidden');
        }

        function recursiveAction(list, id, action) {
            for (let i = 0; i < list.length; i++) {
                if (list[i].id === id) {
                    action(list, i);
                    return true;
                }
                if (list[i].subtasks && recursiveAction(list[i].subtasks, id, action)) return true;
            }
            return false;
        }

        function completeTask(id) {
            recursiveAction(window.tasks, id, (list, idx) => {
                list[idx].completed = true;
                if (list[idx].subtasks) list[idx].subtasks.forEach(s => s.completed = true);
            });
            saveAndRender();
        }

        function deleteTask(id) {
            recursiveAction(window.tasks, id, (list, idx) => list.splice(idx, 1));
            saveAndRender();
        }

        // --- RENDERIZADO ---

        function createDeepTaskHTML(t, level = 0) {
            const hasSubtasks = t.subtasks && t.subtasks.length > 0;
            const isExpanded = expandedTasks.has(t.id);
            const colorClass = t.score >= 10 ? 'border-l-red-500' : (t.score >= 7 ? 'border-l-yellow-500' : 'border-l-emerald-500');
            const hasNotes = t.notes && t.notes.trim().length > 0;
            
            let html = `
                <div class="task-card bg-slate-900 p-2 rounded-lg border-l-4 ${colorClass} shadow-md mb-2">
                    <div class="flex justify-between items-start">
                        <div class="cursor-pointer flex-grow" onclick="toggleTaskExpansion(${t.id})">
                            <p class="text-xs font-semibold text-slate-100 flex items-center gap-1">
                                ${hasSubtasks ? `<span class="text-[9px]">${isExpanded ? '▼' : '▶'}</span>` : ''}
                                ${t.title}
                                ${hasNotes ? `<span title="Tiene notas" class="text-sky-400 text-[10px]">📝</span>` : ''}
                            </p>
                            ${t.time ? `<span class="text-[9px] bg-slate-800 text-sky-400 px-1 rounded">🕒 ${t.time}</span>` : ''}
                        </div>
                        <div class="flex gap-1">
                            <button onclick="openSubtaskModal(${t.id}, '${t.title}')" class="text-[10px] bg-sky-900/40 text-sky-400 px-1.5 py-0.5 rounded hover:bg-sky-500 hover:text-white transition">+</button>
                            <button onclick="completeTask(${t.id})" class="text-[10px] bg-emerald-900/40 text-emerald-400 px-1.5 py-0.5 rounded hover:bg-emerald-500 hover:text-white transition">✓</button>
                            <button onclick="deleteTask(${t.id})" class="text-[10px] bg-red-900/40 text-red-400 px-1.5 py-0.5 rounded hover:bg-red-500 hover:text-white transition">×</button>
                        </div>
                    </div>
                    
                    ${isExpanded ? `
                        <div class="mt-2 space-y-2">
                            <textarea 
                                oninput="updateNote(${t.id}, this.value)"
                                placeholder="Escribe notas o pega enlaces aquí..." 
                                class="notes-area w-full bg-slate-950/50 p-2 rounded border border-slate-800 text-slate-400 outline-none focus:border-sky-500/50 resize-none h-14"
                            >${t.notes || ""}</textarea>
                            
                            ${hasSubtasks ? `
                                <div class="subtask-container">
                                    ${t.subtasks.filter(s => !s.completed).map(s => createDeepTaskHTML(s, level + 1)).join('')}
                                </div>
                            ` : ''}
                        </div>
                    ` : ''}
                </div>
            `;
            return html;
        }

        function renderKanban() {
            const board = document.getElementById('kanbanBoard');
            board.innerHTML = '';
            const todayISO = toLocalISO(new Date());

            for (let i = 0; i < 7; i++) {
                let colDate = new Date(currentWeekStart);
                colDate.setDate(colDate.getDate() + i);
                let colISO = toLocalISO(colDate);
                let dayName = weekDays[i];

                const dayTasks = window.tasks.filter(t => {
                    if (t.completed) return false;
                    return t.isRecurring ? (t.days.includes(dayName) && colISO >= t.startDate) : (t.startDate === colISO);
                }).sort((a,b) => b.score - a.score);

                let colHtml = `
                    <div class="min-w-[260px] w-[260px] bg-slate-800/80 rounded-xl flex flex-col border ${colISO === todayISO ? 'border-sky-500' : 'border-slate-700'} h-full shrink-0">
                        <div class="p-3 border-b border-slate-700">
                            <h3 class="font-bold text-xs ${colISO === todayISO ? 'text-sky-400' : 'text-slate-300'}">${dayName}</h3>
                            <p class="text-[10px] text-slate-500">${colDate.toLocaleDateString()}</p>
                        </div>
                        <div class="p-2 overflow-y-auto flex-grow">
                            ${dayTasks.map(t => createDeepTaskHTML(t)).join('')}
                        </div>
                    </div>
                `;
                board.innerHTML += colHtml;
            }
            
            const endOfWeek = new Date(currentWeekStart);
            endOfWeek.setDate(endOfWeek.getDate() + 6);
            document.getElementById('weekLabel').innerText = `${currentWeekStart.toLocaleDateString('es-ES', {day:'numeric', month:'short'})} - ${endOfWeek.toLocaleDateString('es-ES', {day:'numeric', month:'short'})}`;
        }

        function renderCompleted() {
            const list = document.getElementById('completedList');
            list.innerHTML = '';
            const getFlatCompleted = (tasks, acc = []) => {
                tasks.forEach(t => {
                    if (t.completed) acc.push(t);
                    if (t.subtasks) getFlatCompleted(t.subtasks, acc);
                });
                return acc;
            };
            const completed = getFlatCompleted(window.tasks);
            completed.forEach(t => {
                list.innerHTML += `
                    <div class="bg-slate-900/50 p-2 rounded border border-slate-700 flex justify-between items-center">
                        <span class="text-xs line-through text-slate-500">${t.title}</span>
                        <button onclick="deleteTask(${t.id})" class="text-red-400 text-[10px]">Eliminar</button>
                    </div>`;
            });
        }

        function changeWeek(days) {
            currentWeekStart.setDate(currentWeekStart.getDate() + days);
            renderKanban();
        }

        function clearForm(id) {
            document.querySelectorAll(`#${id} input[type="text"], #${id} textarea`).forEach(i => i.value = "");
        }

        renderKanban();
        renderCompleted();
        document.getElementById('taskStartDate').value = toLocalISO(new Date());
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDOVhVaxAoVlP6VpdvPPR1Daa6qOphAMjk",
            authDomain: "mi-priority-planner.firebaseapp.com",
            projectId: "mi-priority-planner",
            storageBucket: "mi-priority-planner.firebasestorage.app",
            messagingSenderId: "101071265369",
            appId: "1:101071265369:web:be0b8666383a678bf99b48"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        let sessionUserId = null;

        document.getElementById('btnLogin').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('btnLogout').onclick = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                sessionUserId = user.uid;
                document.getElementById('authOverlay').classList.add('hidden');
                document.getElementById('userProfile').classList.remove('hidden');
                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('userAvatar').src = user.photoURL;
                
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists() && docSnap.data().tasks) {
                    window.tasks = docSnap.data().tasks;
                    renderKanban();
                    renderCompleted();
                }
            }
        });

        window.addEventListener('tasksUpdated', async (e) => {
            if (sessionUserId) {
                await setDoc(doc(db, "users", sessionUserId), { tasks: e.detail, lastSync: new Date().toISOString() });
            }
        });
    </script>
</body>
</html>
